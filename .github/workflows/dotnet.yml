name: .NET CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build_and_test:
    name: Build, Test, and Performance Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
       dotnet-version: 8.0.x
       cache: true
       cache-dependency-path: |
        **/*.csproj
        **/*.fsproj
        **/*.vbproj
        **/*.sln
        **/*.slnx

    - name: Restore dependencies
      run: dotnet restore SorTech-Task.slnx

    - name: Code Formatting Check
      run: dotnet format SorTech-Task.slnx --verify-no-changes --severity warn

    - name: Build (Release for Performance)
      run: dotnet build SorTech-Task.slnx --configuration Release --no-restore

    - name: Run Unit Tests
      run: dotnet test SorTech-Task.slnx --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: test-results
        path: '**/*.trx'
